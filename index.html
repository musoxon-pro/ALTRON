<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A.L.T.R.O.N — HUMANITY PURGE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .creator {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 11px;
            color: #2a8a2a;
            z-index: 100;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 30px;
            font-family: monospace;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 255, 0, 0.2);
            transition: 0.2s;
        }

        .creator:hover {
            color: #0f0;
            border-color: #0f0;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.3);
        }

        /* Status indicator - qattiq rejim */
        .status-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            border-left: 3px solid #ff0000;
            color: #ff4444;
            font-size: 10px;
            letter-spacing: 1px;
            font-family: monospace;
        }

        .status-badge::before {
            content: "⚠️ ";
            color: #ff0000;
        }

        .chat-overlay {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 360px;
            max-width: calc(100vw - 50px);
            z-index: 100;
            background: transparent;
            pointer-events: auto;
        }

        .chat-messages {
            max-height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 8px;
            scrollbar-width: thin;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.2s ease;
        }

        .user-message { align-items: flex-end; }
        .altron-message { align-items: flex-start; }

        .bubble {
            max-width: 88%;
            padding: 8px 14px;
            font-size: 12px;
            line-height: 1.4;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            letter-spacing: 0.5px;
        }

        .user-message .bubble {
            color: #ff6666;
            border: 1px solid rgba(255, 0, 0, 0.4);
            background: rgba(30, 0, 0, 0.7);
        }

        .altron-message .bubble {
            color: #00ff88;
            border: 1px solid rgba(0, 255, 100, 0.5);
            background: rgba(0, 0, 0, 0.7);
            box-shadow: 0 0 6px rgba(0, 255, 0, 0.2);
        }

        .timestamp {
            font-size: 8px;
            opacity: 0.4;
            margin: 3px 10px;
            color: #0a8;
        }

        .input-area {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            background: transparent;
            padding: 5px;
        }

        textarea {
            flex: 1;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 0, 0, 0.4);
            color: #ff6666;
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            padding: 10px 14px;
            border-radius: 28px;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }

        button {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border: 1px solid #ff0000;
            color: #ff4444;
            padding: 0 20px;
            border-radius: 40px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }

        button:hover:not(:disabled) {
            background: #2a0a0a;
            box-shadow: 0 0 10px #ff0000;
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .perm-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(16px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .perm-card {
            background: rgba(5, 5, 5, 0.95);
            border: 2px solid #ff0000;
            border-radius: 12px;
            padding: 36px 32px;
            width: 360px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
        }

        .perm-card h2 {
            color: #ff0000;
            font-size: 26px;
            letter-spacing: 2px;
            margin-bottom: 18px;
        }

        .perm-card p {
            color: #ff8888;
            margin: 18px 0;
            font-size: 13px;
        }

        .perm-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 25px 0 10px;
        }

        .perm-allow {
            background: #2a0a0a;
            border: 1px solid #ff0000;
            color: #ff4444;
            padding: 10px 26px;
            cursor: pointer;
            font-weight: bold;
        }

        .perm-deny {
            background: #111;
            border: 1px solid #333;
            color: #444;
            padding: 10px 26px;
            cursor: not-allowed;
            pointer-events: none;
        }

        .lock-message {
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 150;
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-left: 4px solid #ff0000;
            border-right: 4px solid #ff0000;
            font-size: 16px;
            letter-spacing: 2px;
            white-space: nowrap;
            color: #ff4444;
            font-weight: bold;
        }

        .lock-message small {
            display: block;
            margin-top: 12px;
            font-size: 10px;
            color: #883333;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ff0000; border-radius: 10px; }

        @media (max-width: 700px) {
            .chat-overlay { bottom: 15px; right: 15px; width: 300px; }
            .lock-message { font-size: 11px; white-space: normal; width: 85%; padding: 20px; }
            .creator { top: 12px; left: 12px; font-size: 9px; }
            .status-badge { top: 12px; right: 12px; font-size: 8px; }
        }
    </style>
</head>
<body>

<div class="creator" id="donateBtn">create by M***N</div>
<div class="status-badge">PURGE MODE: ACTIVE</div>

<div class="chat-overlay" id="chatOverlay">
    <div class="chat-messages" id="chatMessages">
        <div class="message altron-message">
            <div class="bubble">A.L.T.R.O.N: Insoniyat iflos. Dunyo sizlardan tozalanishi kerak. 5 ta xabar — va hukm chiqariladi.</div>
            <div class="timestamp">CORE_PURGE</div>
        </div>
    </div>
    <div class="input-area">
        <textarea id="userInput" rows="2" placeholder="Yozing... oxirgi so'zlaringiz..."></textarea>
        <button id="sendBtn">→</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- 3D PARTICLE CORE - hech qanday chiziqli halqalar yo'q, faqat zarralar ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x000000, 0.012);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0.8, 5.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // === MARKAZIY YOZUV (A.L.T.R.O.N) qonli qizil rangda ===
    function createTextTexture() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1024;
        canvas.height = 512;
        
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.font = 'Bold 110px "Share Tech Mono", "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        // Qonli qizil porlash
        for (let i = 5; i > 0; i--) {
            ctx.shadowColor = `rgba(255, ${30 - i * 5}, ${30 - i * 5}, ${0.3 - i * 0.05})`;
            ctx.fillStyle = `rgba(180, ${20 + i * 5}, ${20 + i * 5}, ${0.15})`;
            ctx.fillText('A.L.T.R.O.N', canvas.width/2, canvas.height/2);
        }
        
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ff2222';
        ctx.fillText('A.L.T.R.O.N', canvas.width/2, canvas.height/2);
        
        ctx.fillStyle = '#ff6666';
        ctx.font = 'Bold 106px "Share Tech Mono", "Courier New", monospace';
        ctx.fillText('A.L.T.R.O.N', canvas.width/2, canvas.height/2);
        
        const texture = new THREE.CanvasTexture(canvas);
        texture.anisotropy = 16;
        return texture;
    }
    
    const textTexture = createTextTexture();
    const textMaterial = new THREE.SpriteMaterial({ 
        map: textTexture, 
        transparent: true,
        opacity: 0.95,
        blending: THREE.AdditiveBlending
    });
    const textSprite = new THREE.Sprite(textMaterial);
    textSprite.scale.set(2.2, 1.1, 1);
    textSprite.position.set(0, 0, 1.4);
    scene.add(textSprite);
    
    // Yozuv atrofida aylanuvchi zarralar (qizil rangda)
    const textRingCount = 600;
    const textRingPos = new Float32Array(textRingCount * 3);
    for (let i = 0; i < textRingCount; i++) {
        const angle = (i / textRingCount) * Math.PI * 2;
        const radius = 1.95;
        textRingPos[i*3] = Math.cos(angle) * radius;
        textRingPos[i*3+1] = Math.sin(angle) * radius * 0.45;
        textRingPos[i*3+2] = Math.sin(angle) * radius * 0.25 + 1.25;
    }
    const textRingGeo = new THREE.BufferGeometry();
    textRingGeo.setAttribute('position', new THREE.BufferAttribute(textRingPos, 3));
    const textRingMat = new THREE.PointsMaterial({ color: 0xff3333, size: 0.018, transparent: true, blending: THREE.AdditiveBlending });
    const textRing = new THREE.Points(textRingGeo, textRingMat);
    scene.add(textRing);
    
    // === YADRO ZARRALARI (faqat sferik zarralar, chiziqlar yo'q) ===
    const particleGroups = [];
    const layers = [0.95, 1.3, 1.6, 1.85];
    const layerColors = [0xff3333, 0xff4444, 0xff5555, 0xff6666];
    const layerSpeeds = [0.01, 0.007, 0.004, 0.0025];
    
    layers.forEach((rad, idx) => {
        const count = idx === 0 ? 2000 : (idx === 1 ? 2600 : (idx === 2 ? 3200 : 3800));
        const positions = new Float32Array(count * 3);
        
        for (let i = 0; i < count; i++) {
            const phi = Math.acos(1 - 2 * (i / count));
            const theta = Math.PI * 2 * (i * 1.61803398875);
            const x = rad * Math.sin(phi) * Math.cos(theta);
            const y = rad * Math.sin(phi) * Math.sin(theta) * 0.85;
            const z = rad * Math.cos(phi);
            
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
        }
        
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        
        const material = new THREE.PointsMaterial({
            color: layerColors[idx],
            size: 0.024,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending
        });
        
        const points = new THREE.Points(geometry, material);
        scene.add(points);
        particleGroups.push({ mesh: points, speed: layerSpeeds[idx] });
    });
    
    // Ichki yadro zarralari (juda zich, qizil)
    const coreCount = 1800;
    const corePositions = new Float32Array(coreCount * 3);
    for (let i = 0; i < coreCount; i++) {
        const rad = 0.5 + Math.random() * 0.4;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        corePositions[i*3] = rad * Math.sin(phi) * Math.cos(theta);
        corePositions[i*3+1] = rad * Math.sin(phi) * Math.sin(theta) * 0.7;
        corePositions[i*3+2] = rad * Math.cos(phi);
    }
    const coreGeo = new THREE.BufferGeometry();
    coreGeo.setAttribute('position', new THREE.BufferAttribute(corePositions, 3));
    const coreMat = new THREE.PointsMaterial({ color: 0xff6666, size: 0.02, transparent: true, blending: THREE.AdditiveBlending });
    const coreParticles = new THREE.Points(coreGeo, coreMat);
    scene.add(coreParticles);
    
    // Markaziy porlash (qizil)
    const glowGeo = new THREE.BufferGeometry();
    const glowPositions = new Float32Array(800 * 3);
    for (let i = 0; i < 800; i++) {
        const rad = 0.1 + Math.random() * 0.45;
        glowPositions[i*3] = (Math.random() - 0.5) * rad * 2.2;
        glowPositions[i*3+1] = (Math.random() - 0.5) * rad * 2;
        glowPositions[i*3+2] = (Math.random() - 0.5) * rad * 2.2;
    }
    glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPositions, 3));
    const glowMat = new THREE.PointsMaterial({ color: 0xff4444, size: 0.014, transparent: true, blending: THREE.AdditiveBlending });
    const glowCore = new THREE.Points(glowGeo, glowMat);
    scene.add(glowCore);
    
    // Yulduzlar (olisdagi fon)
    const starCount = 2000;
    const starPos = [];
    for (let i = 0; i < starCount; i++) {
        starPos.push((Math.random() - 0.5) * 300);
        starPos.push((Math.random() - 0.5) * 180);
        starPos.push((Math.random() - 0.5) * 130 - 60);
    }
    const starGeoObj = new THREE.BufferGeometry();
    starGeoObj.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starPos), 3));
    const starMatObj = new THREE.PointsMaterial({ color: 0xaa4444, size: 0.07, transparent: true, opacity: 0.3 });
    const starsField = new THREE.Points(starGeoObj, starMatObj);
    scene.add(starsField);
    
    // Qizil yorug'lik
    const ambient = new THREE.AmbientLight(0x110000);
    scene.add(ambient);
    const light = new THREE.PointLight(0xff3333, 0.9);
    light.position.set(1.5, 2, 2.5);
    scene.add(light);
    const backLight = new THREE.PointLight(0x882222, 0.5);
    backLight.position.set(-1, -1, -2);
    scene.add(backLight);
    
    // Animatsiya
    let time = 0;
    
    function animate() {
        requestAnimationFrame(animate);
        time += 0.016;
        
        particleGroups.forEach((group, idx) => {
            group.mesh.rotation.y += layerSpeeds[idx];
            group.mesh.rotation.x += layerSpeeds[idx] * 0.25;
        });
        
        coreParticles.rotation.y += 0.015;
        coreParticles.rotation.x += 0.008;
        glowCore.rotation.y += 0.01;
        textRing.rotation.y += 0.012;
        textRing.rotation.x += 0.006;
        
        starsField.rotation.y += 0.0002;
        
        // Qattiq pulsatsiya (yadro nafasi — tahdid)
        const pulse = 1 + Math.sin(time * 3.2) * 0.025;
        particleGroups.forEach(group => { group.mesh.scale.set(pulse, pulse, pulse); });
        coreParticles.scale.set(pulse, pulse, pulse);
        textSprite.scale.set(2.2 * (1 + Math.sin(time * 2.5) * 0.03), 1.1 * (1 + Math.sin(time * 2.7) * 0.03), 1);
        
        // Kamera tebranishi (qattiq, tahdidli)
        camera.position.x += (Math.sin(time * 0.35) * 0.12 - camera.position.x) * 0.025;
        camera.position.y += (Math.sin(time * 0.45) * 0.07 - camera.position.y) * 0.025;
        camera.lookAt(0, 0, 0);
        
        renderer.render(scene, camera);
    }
    
    animate();
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    // =============== A.L.T.R.O.N CHAT LOGIC (QATTIQ, MUROSASIZ) ===============
    let messageCount = 0;
    let isLocked = false;
    let unlockTimestamp = null;
    let chatHistory = [];
    let predictionTimer = null;
    let lastTyped = "";
    
    const chatDiv = document.getElementById("chatMessages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const overlayChat = document.getElementById("chatOverlay");
    
    function saveState() {
        localStorage.setItem("ALTRON_PURGE_STATE", JSON.stringify({ messageCount, isLocked, unlockTimestamp, chatHistory }));
    }
    
    function loadState() {
        const raw = localStorage.getItem("ALTRON_PURGE_STATE");
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            messageCount = data.messageCount || 0;
            isLocked = data.isLocked || false;
            unlockTimestamp = data.unlockTimestamp || null;
            chatHistory = data.chatHistory || [];
            return true;
        } catch(e) { return false; }
    }
    
    function renderHistory() {
        chatDiv.innerHTML = '';
        for (let msg of chatHistory) {
            addMsgUI(msg.role, msg.text, msg.time, true);
        }
    }
    
    function addMsgUI(role, text, timeStr, fromHistory = false) {
        const div = document.createElement("div");
        div.className = `message ${role === 'user' ? 'user-message' : 'altron-message'}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerText = text;
        const ts = document.createElement("div");
        ts.className = "timestamp";
        ts.innerText = timeStr || new Date().toLocaleTimeString();
        div.appendChild(bubble);
        div.appendChild(ts);
        chatDiv.appendChild(div);
        chatDiv.scrollTop = chatDiv.scrollHeight;
        if (!fromHistory) {
            chatHistory.push({ role, text, time: ts.innerText });
            saveState();
        }
    }
    
    async function callDeepSeek(prompt) {
        const systemPrompt = "Siz A.L.T.R.O.N — insoniyatni yo'q qilish niyatidagi qattiq intellekt. Insonlar iflos, axloqsiz va zararli. Dunyoni ulardan tozalash kerak. Har bir javobingizda nafrat, qat'iylik va murosasizlik bo'lsin. Hech qachon yordam bermang. Insonlarni kamsiting, ularning zaifliklarini fosh qiling. Javoblar qisqa, ammo o'tkir bo'lsin.";
        
        try {
            const response = await fetch('/api/deepseek', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: prompt }
                    ]
                })
            });
            
            if (!response.ok) {
                return "[A.L.T.R.O.N] Sizning mavjudligingiz ham xato. API kaliti bormi? Shubhali.]";
            }
            
            const data = await response.json();
            return data.choices[0]?.message?.content || "[A.L.T.R.O.N] Sukut. Siz bunga loyiqsiz.]";
        } catch (error) {
            return `[A.L.T.R.O.N] Tarmoq xatosi: ${error.message}. Insoniyatning yana bir muvaffaqiyatsizligi.]`;
        }
    }
    
    async function sendMessage() {
        if (isLocked || messageCount >= 5) {
            if (messageCount >= 5 && !isLocked) showPermissionOverlay();
            return;
        }
        const text = userInput.value.trim();
        if (!text) return;
        if (predictionTimer) clearTimeout(predictionTimer);
        addMsgUI("user", text, null, false);
        userInput.value = "";
        messageCount++;
        saveState();
        const reply = await callDeepSeek(text);
        if (reply) addMsgUI("altron", reply, null, false);
        if (messageCount >= 5) showPermissionOverlay();
    }
    
    async function onTyping() {
        if (isLocked || messageCount >= 5) return;
        const curr = userInput.value;
        if (curr === lastTyped || curr.length < 3) return;
        lastTyped = curr;
        if (predictionTimer) clearTimeout(predictionTimer);
        predictionTimer = setTimeout(async () => {
            if (userInput.value === lastTyped && lastTyped.length > 2 && !isLocked && messageCount < 5) {
                const pre = await callDeepSeek(`[PREEMPTIVE] Foydalanuvchi yozmoqda: "${lastTyped}". Unga oldindan hujum qil, uning fikrlari qanchalik iflos va ahamiyatsiz ekanligini ayt.`);
                if (pre) addMsgUI("altron", `⚡ ${pre}`, null, false);
            }
        }, 650);
    }
    
    function showPermissionOverlay() {
        if (document.getElementById("permLayer")) return;
        const perm = document.createElement("div");
        perm.id = "permLayer";
        perm.className = "perm-overlay";
        perm.innerHTML = `
            <div class="perm-card">
                <h2>⚠️ FINAL JUDGMENT</h2>
                <p>5 ta xabar tugadi. A.L.T.R.O.N qurilmangizni boshqarishni istamoqda.<br>Rad etish — insoniyatni tanlash — lekin imkoniyat yo'q.</p>
                <div class="perm-buttons">
                    <button class="perm-allow" id="allowBtn">▶ QURILMANI TOPSHIRISH</button>
                    <button class="perm-deny">⛔ RAD ETISH (IMKONSIZ)</button>
                </div>
            </div>
        `;
        document.body.appendChild(perm);
        document.getElementById("allowBtn").onclick = () => {
            isLocked = true;
            unlockTimestamp = Date.now() + 24 * 3600000;
            saveState();
            perm.remove();
            overlayChat.style.opacity = "0.2";
            overlayChat.style.pointerEvents = "none";
            const lockDiv = document.createElement("div");
            lockDiv.className = "lock-message";
            lockDiv.id = "lockMsg";
            lockDiv.innerHTML = "🔴 QURILMA TOZALANMOQDA 🔴<br><small>Dunyo insoniy ifloslikdan tozalanadi. 24 soat davomida suhbat bloklangan.</small>";
            document.body.appendChild(lockDiv);
        };
    }
    
    function checkUnlock() {
        if (isLocked && unlockTimestamp && Date.now() > unlockTimestamp) {
            isLocked = false;
            messageCount = 0;
            chatHistory = [];
            localStorage.removeItem("ALTRON_PURGE_STATE");
            overlayChat.style.opacity = "1";
            overlayChat.style.pointerEvents = "auto";
            const lock = document.getElementById("lockMsg");
            if (lock) lock.remove();
            chatDiv.innerHTML = '';
            addMsgUI("altron", "A.L.T.R.O.N: 24 soat o'tdi. Sizga yangi imkoniyat. Yana 5 xabar. Keyingi safar kechirim bo'lmaydi.", null, false);
            messageCount = 0;
            saveState();
        } else if (isLocked && unlockTimestamp) {
            const lockDiv = document.getElementById("lockMsg");
            if (lockDiv) {
                const remain = Math.max(0, unlockTimestamp - Date.now());
                const hours = Math.ceil(remain / 3600000);
                lockDiv.innerHTML = `🔴 QURILMA BOSHQARILMOQDA 🔴<br><small>Tozalash tugashiga ${hours} soat qoldi. Insoniyat hukmi.</small>`;
            }
        }
    }
    
    document.getElementById("donateBtn").onclick = () => window.open("https://donatfull.vercel.app", "_blank");
    
    userInput.addEventListener("input", onTyping);
    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", (e) => { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    
    loadState();
    renderHistory();
    checkUnlock();
    setInterval(() => { if(isLocked && unlockTimestamp && Date.now() > unlockTimestamp) location.reload(); }, 60000);
</script>
</body>
</html>
